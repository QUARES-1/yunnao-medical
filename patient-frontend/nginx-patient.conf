server {
    listen 80;
    server_name cloud-brain-patient.local;

    root /usr/share/nginx/html/cloud-brain-patient;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /upload/ {
        proxy_pass http://127.0.0.1:8080/upload/;
        proxy_set_header Host $host;
    }

    # 真实 SSE 流式接口使用此配置，关闭 Nginx 缓冲后内容才能逐段到达前端。
    location /api/ai/stream/ {
        proxy_pass http://127.0.0.1:8080/api/ai/stream/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
