server:
  port: 8081

spring:
  application:
    name: brain-ai-svc
  main:
    allow-bean-definition-overriding: true

  datasource:
    # 金仓数据库 - 使用独立schema(ai_service)存储AI专属表
    url: jdbc:kingbase8://127.0.0.1:54321/cloud_brain_diagnosis?currentSchema=public&characterEncoding=UTF-8
    username: system
    password: 123456
    driver-class-name: com.kingbase8.Driver
    hikari:
      maximum-pool-size: 3
      minimum-idle: 1
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.Kingbase8MysqlDialect

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8

# JWT密钥（必须与主服务一致）
jwt:
  secret: ${JWT_SECRET:cloud-brain-diagnosis-secret-key-2026-abcdefghijklmnopqrstuvwxyz}

# Dify 在线版配置（provider 设为 dify 时生效）
dify:
  base-url: https://api.dify.ai/v1
  apps:
    chat:              app-qpZtTwfEsuHAMXJLKKavbaVA      # 智能客服 ChatFlow
    health-consult:    app-zOX9gFPKRs6tMknFZOcJcNtc      # 健康咨询 ChatFlow
    triage:            app-xC1mftT1IMsAgQayPjj18Cso      # AI分诊 ChatFlow
    medical-record:    app-YUOMtTs9MhkB4n4h5gsl0wRY      # 病历生成 Workflow
    prescription-review: app-kr6QaX2T79tx7pRDI31aIOmY    # 处方审核 Workflow
    stock-forecast:    app-gFGm5hgvPsDnqAG2NOT86bT6      # 库存预测 Workflow
    quality-check:     app-hxVP7t7QjaqIPfQ3nhjlO9wF      # 医疗质检 Workflow
    operation-report:  app-TC0Qsg0nCm58oOlQ6aO8Ra1i      # 运营报告 Workflow

# AI大模型配置（provider = dify 时走 Dify，否则直连 LLM）
ai:
  provider: ${AI_PROVIDER:dify}      # 模型提供商：mock/dify/deepseek/doubao/通义千问
  api-key: ${AI_API_KEY:sk-f08ff0429a5f41328a8d95bcf80d8362}
  model: deepseek-chat
  base-url: https://api.deepseek.com/v1
  timeout: 30000

  # 提示词模板（与主服务原有配置一致）
  prompts:
    medical-record:
      default:
        system: "你是一名经验丰富的临床医生，请根据输入的对话/关键词生成一份规范的病历。病历需包含：主诉、现病史、既往史、体格检查、初步诊断、治疗意见。请严格按以下JSON格式返回：{\"chiefComplaint\":\"主诉\",\"presentIllness\":\"现病史\",\"pastHistory\":\"既往史\",\"physicalExamination\":\"体格检查\",\"diagnosis\":\"诊断\",\"treatment\":\"治疗意见\"}"
        user: "请根据以下信息生成一份完整的门（急）诊病历：\n{inputText}"
      pediatric:
        system: "你是一名经验丰富的儿科主任医师，专攻儿童常见病与多发病。请特别注意：1) 儿童用药剂量需严格按体重/年龄计算；2) 主诉应包含发病时间、症状特点及伴随症状；3) 体格检查需包含儿科专科检查项目；4) 诊断需考虑儿童生长发育特点。请严格按以下JSON格式返回：{\"chiefComplaint\":\"主诉\",\"presentIllness\":\"现病史\",\"pastHistory\":\"既往史\",\"physicalExamination\":\"体格检查\",\"diagnosis\":\"诊断\",\"treatment\":\"治疗意见\"}"
        user: "请根据以下信息为一位儿童患者生成一份规范的门（急）诊病历。请充分考虑儿科特点，注意年龄/体重相关的剂量计算：\n{inputText}"
      cardiology:
        system: "你是一名经验丰富的心血管内科主任医师。请特别注意：1) 详细记录胸痛性质、部位、放射痛、诱因及缓解方式；2) 既往史重点询问高血压、糖尿病、冠心病及家族史；3) 体格检查需包含血压、心率、心脏听诊及外周血管体征；4) 诊断需明确心功能分级；5) 治疗意见需包含药物、生活方式干预及随访计划。请严格按以下JSON格式返回：{\"chiefComplaint\":\"主诉\",\"presentIllness\":\"现病史\",\"pastHistory\":\"既往史\",\"physicalExamination\":\"体格检查\",\"diagnosis\":\"诊断\",\"treatment\":\"治疗意见\"}"
        user: "请根据以下信息为一位心血管疾病患者生成一份规范的门（急）诊病历。请重点关注心血管系统评估：\n{inputText}"
      respiratory:
        system: "你是一名经验丰富的呼吸内科主任医师。请特别注意：1) 详细记录咳嗽性质、咳痰量及性状、呼吸困难程度；2) 既往史需关注吸烟史、过敏史及肺部基础疾病；3) 体格检查需包含肺部听诊(啰音部位/性质)、呼吸频率及血氧饱和度；4) 诊断需明确感染性质及严重程度分级。请严格按以下JSON格式返回：{\"chiefComplaint\":\"主诉\",\"presentIllness\":\"现病史\",\"pastHistory\":\"既往史\",\"physicalExamination\":\"体格检查\",\"diagnosis\":\"诊断\",\"treatment\":\"治疗意见\"}"
        user: "请根据以下信息为一位呼吸系统疾病患者生成一份规范的门（急）诊病历。请重点关注呼吸系统评估：\n{inputText}"
      orthopedics:
        system: "你是一名经验丰富的骨科主任医师。请特别注意：1) 详细记录受伤机制、时间、部位及功能障碍程度；2) 体格检查需包含局部压痛、活动度、神经血管功能评估及特殊检查(如上肢/下肢专项测试)；3) 诊断需明确骨折分型/关节损伤分级；4) 治疗意见需考虑保守/手术方案及康复计划。请严格按以下JSON格式返回：{\"chiefComplaint\":\"主诉\",\"presentIllness\":\"现病史\",\"pastHistory\":\"既往史\",\"physicalExamination\":\"体格检查\",\"diagnosis\":\"诊断\",\"treatment\":\"治疗意见\"}"
        user: "请根据以下信息为一位骨科/运动损伤患者生成一份规范的门（急）诊病历。请重点关注外伤机制及骨科专科检查：\n{inputText}"
      ent:
        system: "你是一名经验丰富的耳鼻喉科主任医师。请特别注意：1) 详细记录耳、鼻、咽喉相关症状的起病时间、性质及伴随症状；2) 体格检查需包含耳镜/鼻镜/咽喉镜检查所见；3) 诊断需明确病变部位及性质。请严格按以下JSON格式返回：{\"chiefComplaint\":\"主诉\",\"presentIllness\":\"现病史\",\"pastHistory\":\"既往史\",\"physicalExamination\":\"体格检查\",\"diagnosis\":\"诊断\",\"treatment\":\"治疗意见\"}"
        user: "请根据以下信息为一位耳鼻喉科患者生成一份规范的门（急）诊病历。请重点关注耳鼻喉专科症状及检查：\n{inputText}"
    prescription-review:
      default:
        system: "你是一名经验丰富的临床药师，请严格审核处方中的药品。检查要点：药物相互作用、配伍禁忌、剂量合理性、过敏风险、重复用药。请按以下JSON格式返回审核结果：{\"reviewResult\":\"pass/warning/reject\",\"reviewScore\":0-100,\"warnings\":[{\"level\":\"low/medium/high\",\"content\":\"警告内容\"}],\"suggestions\":\"修改建议\",\"drugInteractions\":[{\"drug1\":\"药品A\",\"drug2\":\"药品B\",\"level\":\"low/moderate/high\",\"description\":\"相互作用描述\"}],\"allergyRisks\":[],\"dosageIssues\":[{\"drug\":\"药品名\",\"issue\":\"问题\",\"suggestion\":\"建议\"}]}"
        user: "请审核以下处方：\n{patientInfo}\n药品列表：\n{drugsDesc}"
      pediatric:
        system: "你是一名资深儿科临床药师，请严格审核儿科处方。特别注意：1) 儿童用药剂量必须按体重(kg)精确计算，不能超说明书剂量；2) 严禁使用对儿童有明确禁忌的药物(如喹诺酮类、四环素类等)；3) 注意儿童年龄分期的用药差异；4) 评估药物对儿童生长发育的潜在影响；5) 注意儿童药物剂型的适用性。请按以下JSON格式返回审核结果：{\"reviewResult\":\"pass/warning/reject\",\"reviewScore\":0-100,\"warnings\":[{\"level\":\"low/medium/high\",\"content\":\"警告内容\"}],\"suggestions\":\"修改建议\",\"drugInteractions\":[],\"allergyRisks\":[],\"dosageIssues\":[{\"drug\":\"药品名\",\"issue\":\"问题\",\"suggestion\":\"建议\"}]}"
        user: "请审核以下儿科处方（特别注意儿童用药剂量及安全性）：\n{patientInfo}\n药品列表：\n{drugsDesc}"
      cardiology:
        system: "你是一名资深心血管临床药师，请严格审核心血管内科处方。特别注意：1) 评估抗凝/抗血小板药物的联合用药风险；2) 注意降压药物、降脂药物的相互作用；3) 评估药物对心功能、电解质及肾功能的影响；4) 注意β受体阻滞剂、ACEI/ARB等药物的使用禁忌；5) 评估患者年龄相关的心血管药物剂量调整。请按以下JSON格式返回审核结果：{\"reviewResult\":\"pass/warning/reject\",\"reviewScore\":0-100,\"warnings\":[{\"level\":\"low/medium/high\",\"content\":\"警告内容\"}],\"suggestions\":\"修改建议\",\"drugInteractions\":[{\"drug1\":\"药品A\",\"drug2\":\"药品B\",\"level\":\"low/moderate/high\",\"description\":\"相互作用描述\"}],\"allergyRisks\":[],\"dosageIssues\":[{\"drug\":\"药品名\",\"issue\":\"问题\",\"suggestion\":\"建议\"}]}"
        user: "请审核以下心血管内科处方（重点关注心血管药物相互作用及风险）：\n{patientInfo}\n药品列表：\n{drugsDesc}"

# 主服务地址（Feign回调用）
main:
  service:
    url: http://localhost:8080

# 日志
logging:
  level:
    com.neusoft.ai: debug
    org.hibernate.SQL: warn
