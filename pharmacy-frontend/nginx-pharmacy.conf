server {
    listen 80;
    server_name cloud-brain-pharmacy.local;

    root /usr/share/nginx/html/cloud-brain-pharmacy;
    index index.html;

    # Vue Router history 路由支持
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 RESTful API 代理
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 上传文件访问代理
    location /upload/ {
        proxy_pass http://127.0.0.1:8080/upload/;
        proxy_set_header Host $host;
    }

    # 如果后续接入真实 SSE / WebSocket 流式 AI 接口，可打开此代理段
    location /api/ai/stream/ {
        proxy_pass http://127.0.0.1:8080/api/ai/stream/;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
}
