server:
  port: 8080

spring:
  datasource:
    # 金仓数据库配置
    url: jdbc:kingbase8://LRM:54321/cloud_brain_diagnosis?characterEncoding=UTF-8
    username: system
    password: 123456
    driver-class-name: com.kingbase8.Driver

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.Kingbase8MysqlDialect

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# JWT密钥配置（生产环境请通过环境变量 JWT_SECRET 覆盖）
jwt:
  secret: ${JWT_SECRET:cloud-brain-diagnosis-secret-key-2026-abcdefghijklmnopqrstuvwxyz}

# 微信小程序配置（生产环境请通过环境变量覆盖）
wechat:
  appid: ${WECHAT_APPID:wx64e4374dc4f3c242}
  secret: ${WECHAT_SECRET:216716b85a1d593ba5b59d8887523c2a}

# 文件上传路径
file:
  upload:
    path: D:/upload/

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 云脑诊疗平台API文档
    description: 传统业务后端接口
    version: 1.0.0

# AI大模型配置（开发环境使用mock模式，无需真实API）
ai:
  provider: deepseek              # 模型提供商：mock/doubao/通义千问
  api-key: sk-f08ff0429a5f41328a8d95bcf80d8362       # API密钥（mock模式不需要）
  model: deepseek-chat           # 模型名称
  base-url: https://api.deepseek.com/v1  # API地址
  timeout: 30000              # 超时时间（毫秒）

# 日志配置
logging:
  level:
    com.neusoft.cloud_brain_diagnosis: debug
    org.hibernate.SQL: debug

