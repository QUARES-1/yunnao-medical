server {
    listen 80;
    server_name cloud-brain-admin.local;

    root /usr/share/nginx/html/cloud-brain-admin;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # AI 运营报告 SSE：关闭代理缓冲，保证浏览器逐段收到内容
    location = /api/admin/ai/operation-report/stream {
        proxy_pass http://127.0.0.1:8080/api/admin/ai/operation-report/stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header token $http_token;
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 120s;
        add_header X-Accel-Buffering no;
    }
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
    }

    location /upload/ {
        proxy_pass http://127.0.0.1:8080/upload/;
    }
}

