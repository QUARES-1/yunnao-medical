server:
  port: 8080

spring:
  # 数据源配置
  datasource:
    url: jdbc:mysql://localhost:3306/cloud_brain_diagnosis?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: ROOT
    driver-class-name: com.mysql.cj.jdbc.Driver

  # JPA配置
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# 微信小程序配置
wechat:
  appid: wx1234567890abcdef
  secret: your_secret_here

# 文件上传路径
file:
  upload:
    path: D:/upload/

# Knife4j配置
knife4j:
  enable: true
  openapi:
    title: 云脑诊疗平台API文档
    description: 传统业务后端接口
    version: 1.0.0

# 日志配置
logging:
  level:
    com.neusoft.cloud_brain_diagnosis: debug
    org.hibernate.SQL: debug